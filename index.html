            if (currentIndex >= imageList.length) return;
            const limit = Math.min(currentIndex + batchSize, imageList.length);
            for (let i = currentIndex; i < limit; i++) {
              const img = new Image();
              img.src = imageList[i];
            }
            currentIndex = limit;
            setTimeout(loadNextBatch, 200);
          }
          
          loadNextBatch();
        }, 1500);
